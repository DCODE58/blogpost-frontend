<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard &mdash; The Chronicle Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="admin-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <div class="sidebar-logo-dot"></div>
        Chronicle
      </div>
      <div class="sidebar-tagline">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Content</div>
      <a href="dashboard.html" class="sidebar-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a href="create.html" class="sidebar-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        New Post
      </a>
      <div class="sidebar-section-label">Site</div>
      <a href="../index.html" class="sidebar-link" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        View Live Site
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="user-avatar">A</div>
        <div>
          <div class="sidebar-user-name" id="user-name">Admin</div>
          <div class="sidebar-user-role">Administrator</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm btn-full" id="logout-btn" style="justify-content:flex-start">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:0.8rem">
        <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="topbar-title">Dashboard</h1>
      </div>
      <div class="topbar-actions">
        <a href="create.html" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span class="btn-text">New Post</span>
        </a>
      </div>
    </div>

    <div class="admin-body">

      <!-- STAT CARDS -->
      <div class="stats-row">
        <div class="stat-card stat-card-yellow">
          <div>
            <div class="stat-card-label">Published</div>
            <div class="stat-card-value" id="stat-published">—</div>
          </div>
          <div class="stat-card-deco">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586l5.414 5.414V19a2 2 0 0 1-2 2z"/>
            </svg>
          </div>
        </div>
        <div class="stat-card stat-card-pink">
          <div>
            <div class="stat-card-label">Drafts</div>
            <div class="stat-card-value" id="stat-draft">—</div>
          </div>
          <div class="stat-card-deco">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
        </div>
        <div class="stat-card stat-card-sage">
          <div>
            <div class="stat-card-label">Total Views</div>
            <div class="stat-card-value" id="stat-views">—</div>
          </div>
          <div class="stat-card-deco">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- POSTS TABLE -->
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">All Posts</span>
          <div class="table-filters">
            <input class="filter-input" id="filter-search" type="search" placeholder="Search title..." />
            <select class="filter-input" id="filter-status">
              <option value="">All Status</option>
              <option value="published">Published</option>
              <option value="draft">Draft</option>
            </select>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Status</th>
                <th>Views</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="posts-tbody">
              <tr>
                <td colspan="6" class="table-empty">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                  </svg>
                  <p>Loading posts...</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </div>
    <h2 class="modal-title">Delete Post?</h2>
    <p class="modal-text">Delete "<strong id="modal-post-title"></strong>"? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-danger" id="modal-confirm">
        <div class="btn-loader"></div>
        <span class="btn-text">Delete Post</span>
      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="../js/config.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
