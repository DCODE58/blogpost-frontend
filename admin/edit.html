<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Post — The Chronicle Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet" />
  <!-- Fonts available inside the editor -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Georgia&display=swap" rel="stylesheet" />
</head>
<body>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <div class="sidebar-logo-dot"></div>
        Chronicle
      </div>
      <div class="sidebar-tagline">Admin Panel</div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Content</div>
      <a href="dashboard.html" class="sidebar-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a href="create.html" class="sidebar-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        New Post
      </a>

      <div class="sidebar-section-label">Site</div>
      <a href="../index.html" class="sidebar-link" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        View Site
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="user-avatar">A</div>
        <div>
          <div class="sidebar-user-name" id="user-name">Admin</div>
          <div class="sidebar-user-role">Administrator</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm btn-full" id="logout-btn"
        style="justify-content:flex-start;color:rgba(245,240,230,0.45)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:0.8rem">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <a href="dashboard.html" style="display:inline-flex;align-items:center;gap:0.4rem;font-size:0.82rem;color:var(--muted);font-family:var(--font-ui);font-weight:600">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
            <path d="m15 18-6-6 6-6"/>
          </svg>
          Back
        </a>
        <h1 class="topbar-title">Edit Post</h1>
        <span id="post-id-badge" style="font-size:0.75rem;background:var(--cream-2);border:1px solid var(--border-light);border-radius:100px;padding:0.2rem 0.7rem;font-family:var(--font-ui);font-weight:700;color:var(--muted)"></span>
      </div>
      <div class="topbar-actions">
        <a id="preview-link" href="#" target="_blank" class="btn btn-secondary" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          Preview
        </a>
        <button class="btn btn-primary" id="update-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span class="btn-text">Update Post</span>
          <div class="btn-loader"></div>
        </button>
      </div>
    </div>

    <!-- Loading state -->
    <div id="loading-overlay" class="admin-body" style="display:flex;align-items:center;justify-content:center;min-height:300px">
      <div style="text-align:center;color:var(--muted)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32"
          style="margin:0 auto 0.8rem;animation:spin 1s linear infinite;display:block">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <p style="font-family:var(--font-ui);font-weight:600;font-size:0.85rem">Loading post...</p>
      </div>
    </div>

    <div class="admin-body" id="editor-container" style="display:none">
      <div id="form-error" style="display:none;margin-bottom:1.2rem;padding:0.9rem 1.1rem;background:var(--danger-pale);color:var(--danger);border:2px solid var(--danger);border-radius:var(--radius-sm);font-family:var(--font-ui);font-weight:600;font-size:0.88rem"></div>

      <div class="editor-layout">

        <div class="editor-main">
          <input id="post-title" class="editor-field-title" type="text" placeholder="Post title..." />
          <label class="editor-label" style="margin-bottom:0.6rem">Content</label>
          <div id="quill-editor"></div>
          <div class="editor-wordcount">
            <span id="wc-words"><span id="word-count">0</span> words</span>
            <span id="wc-chars"><span id="char-count">0</span> characters</span>
            <span id="wc-read"><span id="read-time">0</span> min read</span>
          </div>
        </div>

        <div>
          <div class="editor-sidebar-panel">
            <div class="panel-title">Status</div>
            <div class="toggle-group">
              <button class="toggle-btn" id="toggle-draft" data-status="draft">Draft</button>
              <button class="toggle-btn" id="toggle-published" data-status="published">Published</button>
            </div>
            <input type="hidden" id="post-status" value="draft" />
          </div>

          <div class="editor-sidebar-panel">
            <div class="panel-title">Details</div>

            <div class="form-group">
              <label class="editor-label" for="post-category">Category</label>
              <select class="form-select" id="post-category">
                <option value="General">General</option>
                <option value="Technology">Technology</option>
                <option value="Culture">Culture</option>
                <option value="Health">Health</option>
                <option value="Business">Business</option>
                <option value="Science">Science</option>
              </select>
            </div>

            <div class="form-group">
              <label class="editor-label" for="post-image">Cover Image URL</label>
              <input class="form-input" id="post-image" type="url" placeholder="https://..." />
              <div class="image-preview" id="image-preview">
                <img id="preview-img" src="" alt="Cover preview" />
              </div>
            </div>
          </div>

          <div class="editor-sidebar-panel">
            <div class="panel-title">Actions</div>
            <button class="btn btn-primary btn-full" id="update-btn-2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              <span class="btn-text">Update Post</span>
              <div class="btn-loader"></div>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script src="../js/config.js"></script>
<script src="js/edit.js"></script>
</body>
</html>
